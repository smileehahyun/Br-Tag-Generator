<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> '<br>'tag Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-100: #F5F5F5;
            --gray-200: #E5E5E5;
            --gray-300: #D4D4D4;
            --gray-400: #A3A3A3;
            --gray-500: #737373;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            padding: 60px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--gray-300);
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--gray-500);
            font-weight: 400;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (min-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section-header {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-500);
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 20px;
            border: 1px solid var(--gray-300);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: vertical;
            transition: all 0.2s ease;
            background: var(--white);
            color: var(--black);
        }

        textarea:focus {
            outline: none;
            border-color: var(--black);
        }

        textarea::placeholder {
            color: var(--gray-400);
        }

        #output {
            background: var(--gray-100);
            padding: 20px;
            min-height: 400px;
            border: 1px solid var(--gray-300);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
            color: var(--black);
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .option-item input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--gray-400);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .option-item input[type="checkbox"]:hover {
            border-color: var(--black);
        }

        .option-item input[type="checkbox"]:checked {
            background: var(--black);
            border-color: var(--black);
        }

        .option-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 6px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .option-item label {
            font-size: 14px;
            cursor: pointer;
            margin: 0;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 14px 28px;
            border: 1px solid var(--black);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--white);
            color: var(--black);
        }

        button:hover {
            background: var(--black);
            color: var(--white);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-convert {
            background: var(--black);
            color: var(--white);
        }

        .btn-convert:hover {
            background: var(--white);
            color: var(--black);
        }

        .notification {
            position: fixed;
        
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        
            background: var(--black);
            color: var(--white);
            padding: 16px 24px;
            border: 1px solid var(--black);
        
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        
            font-size: 14px;
            font-weight: 500;
        }


        .notification.show {
            opacity: 1;
            transform: translate(-50%, -50%);  /* translate(-50%, -50%)으로 변경 */
        }

        .notification.error {
            background: var(--white);
            color: var(--black);
        }

        footer {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid var(--gray-300);
            text-align: center;
            color: var(--gray-500);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            body {
                padding: 40px 20px;
            }

            header {
                margin-bottom: 40px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }

            .notification {
                right: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1> HTML <code>&lt;br&gt;</code> Tag Generator</h1>
            <p class="subtitle">Insert a single line break without starting a new paragraph!</p>
        </header>

        <div class="main-grid">
            <div class="section">
                <div class="section-header">Input</div>
                <textarea id="input" placeholder="Enter your text...&#10;&#10;Press Enter once  → &lt;br&gt;&#10;Press Enter twice → &lt;br&gt;&lt;br&gt;"></textarea>
            </div>

            <div class="section">
                <div class="section-header">Output</div>
                <div id="output"></div>
            </div>
        </div>

        <div class="controls">
            <div class="option-item">
                <input type="checkbox" id="autoConvert">
                <label for="autoConvert">Auto Convert</label>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-convert" onclick="convertText()">Convert</button>
            <button onclick="copyToClipboard()">Copy</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <footer>
            © 2026 <code>&lt;br&gt;</code>Tag Generator
        </footer>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const inputElement = document.getElementById('input');
        const outputElement = document.getElementById('output');
        const autoConvertCheckbox = document.getElementById('autoConvert');

        inputElement.addEventListener('input', function() {
            if (autoConvertCheckbox.checked) {
                convertText();
            }
        });

        function convertText() {
            const input = inputElement.value;

            if (!input.trim()) {
                outputElement.textContent = '';
                return;
            }

            const result = processParagraph(input);
            outputElement.textContent = result;
        }

        function processParagraph(text) {
            if (!text) return '';

            let result = text.replace(/\n\n/g, '###DOUBLE###');
            result = result.replace(/\n/g, '<br>\n');
            result = result.replace(/###DOUBLE###/g, '<br><br>\n');

            return result;
        }

        function copyToClipboard() {
            const output = outputElement.textContent;
            
            if (!output.trim()) {
                showNotification('No content to copy', 'error');
                return;
            }

            navigator.clipboard.writeText(output).then(function() {
                showNotification('Copied!');
            }, function() {
                showNotification('복사 실패', 'error');
            });
        }

        function clearAll() {
            inputElement.value = '';
            outputElement.textContent = '';
            showNotification('Cleared!');
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification' + (type === 'error' ? ' error' : '');
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
